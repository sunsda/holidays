<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플라잉재팬 관리자 설정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a56db;--blue-l:#e8f0fe;--warn:#d97706;--ok:#059669;--danger:#dc2626;--border:rgba(0,0,0,0.08);--gray:#6b7280}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#111827;font-size:14px;line-height:1.6;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800}
.topbar-title{font-size:15px;font-weight:700;color:#111}
.topbar-badge{background:#fee2e2;color:#991b1b;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px}
.topbar-right{display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-l);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.wrap{max-width:960px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:18px;margin-bottom:16px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.ct{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;color:#111}
.ct i{font-size:18px;color:var(--blue)}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-admin{background:#fef3c7;color:#92400e}.badge-a2{background:#fee2e2;color:#991b1b}
.badge-a1{background:#dbeafe;color:#1e40af}.badge-user{background:#f3f4f6;color:#374151}
.badge-pending{background:#f3f4f6;color:#374151;border:1px dashed #d1d5db}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:#374151;font-family:inherit;transition:.12s;white-space:nowrap}
.btn:hover{background:#f3f4f6}.btn i{font-size:15px}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{background:#1648c0}
.btn-ok{background:var(--ok);color:#fff;border-color:var(--ok)}.btn-ok:hover{background:#047857}
.btn-ng{background:var(--danger);color:#fff;border-color:var(--danger)}.btn-ng:hover{background:#b91c1c}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-warn{background:var(--warn);color:#fff;border-color:var(--warn)}
.form-sel{padding:6px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;background:#fff;font-family:inherit;cursor:pointer;color:#111}
.dept-input{border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:12px;width:110px;font-family:inherit;background:#fff;color:inherit}
.leave-input{border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:12px;width:60px;font-family:inherit;background:#fff;color:inherit;text-align:center}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f9fafb}
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:440px;animation:mi .15s ease}
@keyframes mi{from{transform:translateY(10px) scale(.98);opacity:0}}
.modal-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:16px;color:#111}
.modal-title i{font-size:19px;color:var(--blue)}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.fg{margin-bottom:12px}.fl{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
.fi{width:100%;padding:9px 11px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;background:#fff;font-family:inherit;color:#111}
.fi:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.toast{position:fixed;bottom:24px;right:24px;background:#111;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:ti .2s ease}
@keyframes ti{from{transform:translateY(14px);opacity:0}}
.toast.ok{background:var(--ok)}.toast.err{background:var(--danger)}
.empty{text-align:center;padding:32px;color:var(--gray)}.empty i{font-size:32px;opacity:.35;display:block;margin-bottom:8px}.empty p{font-size:13px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px 16px}
.sl{font-size:11px;color:var(--gray);font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.sv{font-size:24px;font-weight:700}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f4f8,#e8f0fe);padding:24px}
.login-card{background:#fff;border-radius:14px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.09);text-align:center}
.login-logo{width:64px;height:64px;background:#991b1b;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:22px;font-weight:800;color:#fff}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px;border:1.5px solid #d1d5db;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;transition:.15s}
.google-btn:hover{background:#f8faff;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.err-box{background:#fee2e2;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;text-align:left}
.spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-btns{display:flex;gap:4px;margin-bottom:16px;background:#f3f4f6;padding:4px;border-radius:8px;width:fit-content}
.tab-btn{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--gray);font-family:inherit;transition:.1s}
.tab-btn.active{background:#fff;color:#111;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.new-badge{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--danger);margin-left:5px;vertical-align:middle}
</style>
</head>
<body>
<div id="root">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#f0f4f8">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#6b7280">로딩 중...</div>
  </div>
</div>

<script type="module">
import { initializeApp }     from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyAvwdN5mhg2sL4D7zaG-AGEwsK1YfgmfVI",
  authDomain:        "flyingjapan-leave.firebaseapp.com",
  projectId:         "flyingjapan-leave",
  storageBucket:     "flyingjapan-leave.firebasestorage.app",
  messagingSenderId: "973822019022",
  appId:             "1:973822019022:web:fd5473aadf14061539979f"
};

// ── 관리자 이메일 목록 (여기에 관리자 이메일 추가) ────────
const SUPER_ADMINS = [
  "seonyang@flyingjp.com",   // ← 실제 관리자 이메일로 바꾸세요
];

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

const ROLES    = {admin:'최고관리자', approver2:'2차승인자(임원)', approver1:'1차승인자', user:'일반직원'};
const ROLE_CLS = {admin:'badge-admin', approver2:'badge-a2', approver1:'badge-a1', user:'badge-user'};

let me       = null;
let allUsers = [];
let allLeaves= [];
let tab      = 'users'; // users | pending

const rem  = u => (u.totalLeave||0)-(u.usedLeave||0);
const dn   = u => u.name || u.email?.split('@')[0] || '';
const ini  = u => dn(u).slice(0,2).toUpperCase();

function toast(msg, t=''){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');
  el.className='toast '+t;
  el.innerHTML=`<i class="ti ${t==='ok'?'ti-check':t==='err'?'ti-x':'ti-info-circle'}"></i>${msg}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

// ── 인증 ─────────────────────────────────────────────
onAuthStateChanged(auth, async fbUser => {
  if(fbUser){
    // 관리자 이메일 체크
    if(!SUPER_ADMINS.includes(fbUser.email)){
      await signOut(auth);
      render('접근 권한이 없습니다. 관리자 계정으로 로그인하세요.');
      return;
    }
    // Firestore에서 role도 체크
    const snap = await getDoc(doc(db,'users',fbUser.uid));
    if(snap.exists() && snap.data().role !== 'admin'){
      // role이 admin이 아니면 자동으로 admin으로 업데이트
      await updateDoc(doc(db,'users',fbUser.uid), {role:'admin'});
    }
    me = {uid:fbUser.uid, name:fbUser.displayName||'', email:fbUser.email, photoURL:fbUser.photoURL||null};
    await fetchData();
  } else {
    me = null;
    render();
  }
});

async function fetchData(){
  const [uSnap, lSnap] = await Promise.all([
    getDocs(collection(db,'users')),
    getDocs(collection(db,'leaves'))
  ]);
  allUsers  = uSnap.docs.map(d=>({uid:d.id,...d.data()}));
  allLeaves = lSnap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

// ── 렌더 ─────────────────────────────────────────────
function render(err=''){
  document.getElementById('root').innerHTML = me ? appShell() : loginPage(err);
  bind();
}

function loginPage(err=''){
  return `
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo"><i class="ti ti-shield-lock" style="font-size:26px"></i></div>
      <div style="font-size:20px;font-weight:700;margin-bottom:6px">관리자 전용 페이지</div>
      <div style="font-size:13px;color:#6b7280;margin-bottom:24px;line-height:1.8">
        플라잉재팬 휴가대장 관리자 설정<br>
        <span style="font-size:12px;color:#9ca3af">관리자 Google 계정으로만 접근 가능</span>
      </div>
      ${err?`<div class="err-box"><i class="ti ti-alert-circle"></i> ${err}</div>`:''}
      <button class="google-btn" id="btnLogin">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        관리자 Google 계정으로 로그인
      </button>
    </div>
  </div>`;
}

function appShell(){
  const newUsers  = allUsers.filter(u=>u.role==='user'||!u.role).length;
  const pendingL  = allLeaves.filter(l=>l.status==='pending'||l.status==='approved1').length;
  return `
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">FJ</div>
      <div class="topbar-title">휴가대장 관리자</div>
      <span class="topbar-badge"><i class="ti ti-shield" style="font-size:11px"></i> ADMIN</span>
    </div>
    <div class="topbar-right">
      <div class="avatar">${me.photoURL?`<img src="${me.photoURL}">`:(me.name||me.email).slice(0,2).toUpperCase()}</div>
      <span style="font-size:12px;color:#6b7280">${me.email}</span>
      <button class="btn btn-sm" id="btnOut"><i class="ti ti-logout"></i>로그아웃</button>
    </div>
  </div>
  <div class="wrap">

    <!-- 통계 -->
    <div class="stat-grid">
      <div class="stat-card"><div class="sl"><i class="ti ti-users"></i>전체 직원</div><div class="sv">${allUsers.length}명</div></div>
      <div class="stat-card"><div class="sl"><i class="ti ti-user-check"></i>승인자</div><div class="sv">${allUsers.filter(u=>u.role==='approver1'||u.role==='approver2').length}명</div></div>
      <div class="stat-card"><div class="sl"><i class="ti ti-clock"></i>휴가 승인대기</div><div class="sv" style="color:${pendingL>0?'var(--warn)':'var(--ok)'}">${pendingL}건</div></div>
      <div class="stat-card"><div class="sl"><i class="ti ti-calendar"></i>전체 휴가신청</div><div class="sv">${allLeaves.length}건</div></div>
    </div>

    <!-- 탭 -->
    <div class="tab-btns">
      <button class="tab-btn ${tab==='users'?'active':''}" data-tab="users">
        <i class="ti ti-users" style="font-size:14px;margin-right:5px"></i>직원 관리
      </button>
      <button class="tab-btn ${tab==='grant'?'active':''}" data-tab="grant">
        <i class="ti ti-gift" style="font-size:14px;margin-right:5px"></i>휴가 부여
      </button>
      <button class="tab-btn ${tab==='role'?'active':''}" data-tab="role">
        <i class="ti ti-shield-half" style="font-size:14px;margin-right:5px"></i>역할 관리
        ${newUsers>0?`<span class="new-badge"></span>`:''}
      </button>
    </div>

    ${tab==='users' ? tabUsers() : tab==='grant' ? tabGrant() : tabRole()}

  </div>`;
}

// ── 탭: 직원 전체 현황 ────────────────────────────────
function tabUsers(){
  if(!allUsers.length) return `<div class="card"><div class="empty"><i class="ti ti-users-off"></i><p>가입한 직원이 없습니다</p></div></div>`;
  return `
  <div class="card">
    <div class="ch">
      <div class="ct"><i class="ti ti-users"></i>전체 직원 현황</div>
      <span style="font-size:12px;color:#6b7280">총 ${allUsers.length}명</span>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>직원</th><th>이메일</th><th>부서</th><th>역할</th><th>부여/사용/잔여</th><th>가입일</th></tr></thead>
      <tbody>
        ${allUsers.map(u=>`<tr>
          <td>
            <div style="display:flex;align-items:center;gap:9px">
              <div class="avatar" style="width:28px;height:28px;font-size:10px">${u.photoURL?`<img src="${u.photoURL}">`:`${ini(u)}`}</div>
              <span style="font-weight:500">${dn(u)}</span>
            </div>
          </td>
          <td style="font-size:12px;color:#6b7280">${u.email}</td>
          <td style="font-size:12px">${u.dept||'<span style="color:#d1d5db">미지정</span>'}</td>
          <td><span class="badge ${ROLE_CLS[u.role]||'badge-user'}">${ROLES[u.role]||'일반직원'}</span></td>
          <td style="font-size:12px">
            <span style="color:var(--blue);font-weight:600">${u.totalLeave||0}</span> /
            <span style="color:var(--warn)">${u.usedLeave||0}</span> /
            <span style="color:var(--ok)">${rem(u)}</span>일
          </td>
          <td style="font-size:11px;color:#9ca3af">${u.createdAt?.seconds ? new Date(u.createdAt.seconds*1000).toLocaleDateString('ko-KR') : '-'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

// ── 탭: 휴가 부여 ─────────────────────────────────────
function tabGrant(){
  return `
  <div class="card">
    <div class="ch">
      <div class="ct"><i class="ti ti-gift"></i>개인별 휴가 부여</div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>직원</th><th>이메일</th><th>부서</th><th>현재 총 부여일</th><th>사용</th><th>잔여</th><th>추가 부여</th></tr></thead>
      <tbody>
        ${allUsers.map(u=>`<tr>
          <td>
            <div style="display:flex;align-items:center;gap:9px">
              <div class="avatar" style="width:28px;height:28px;font-size:10px">${u.photoURL?`<img src="${u.photoURL}">`:`${ini(u)}`}</div>
              <span style="font-weight:500">${dn(u)}</span>
            </div>
          </td>
          <td style="font-size:12px;color:#6b7280">${u.email}</td>
          <td style="font-size:12px">${u.dept||'-'}</td>
          <td style="font-weight:600;color:var(--blue)">${u.totalLeave||0}일</td>
          <td style="color:var(--warn)">${u.usedLeave||0}일</td>
          <td style="color:var(--ok);font-weight:600">${rem(u)}일</td>
          <td>
            <div style="display:flex;align-items:center;gap:6px">
              <input type="number" class="leave-input grant-days" data-uid="${u.uid}" min="1" max="60" value="5" placeholder="일수">
              <button class="btn btn-p btn-sm do-grant" data-uid="${u.uid}" data-name="${dn(u)}">
                <i class="ti ti-plus"></i>부여
              </button>
            </div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="ch">
      <div class="ct"><i class="ti ti-calendar-stats"></i>전체 일괄 부여</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span style="font-size:13px;color:#6b7280">전체 직원에게 일괄로</span>
      <input type="number" class="fi" id="bulkDays" min="1" max="30" value="1" style="width:80px">
      <span style="font-size:13px;color:#6b7280">일 추가 부여</span>
      <button class="btn btn-warn" id="doBulk"><i class="ti ti-gift"></i>전체 일괄 부여</button>
    </div>
  </div>`;
}

// ── 탭: 역할 관리 ─────────────────────────────────────
function tabRole(){
  const newUsers = allUsers.filter(u=>!u.role||u.role==='user');
  return `
  <div class="card" style="margin-bottom:14px">
    <div class="ch">
      <div class="ct"><i class="ti ti-shield-half"></i>역할 및 부서 관리</div>
      <span style="font-size:12px;color:#6b7280">변경 즉시 저장됩니다</span>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>직원</th><th>이메일</th><th>부서</th><th>현재 역할</th><th>역할 변경</th><th>처리</th></tr></thead>
      <tbody>
        ${allUsers.map(u=>`<tr>
          <td>
            <div style="display:flex;align-items:center;gap:9px">
              <div class="avatar" style="width:28px;height:28px;font-size:10px">${u.photoURL?`<img src="${u.photoURL}">`:`${ini(u)}`}</div>
              <span style="font-weight:500">${dn(u)}</span>
            </div>
          </td>
          <td style="font-size:12px;color:#6b7280">${u.email}</td>
          <td>
            <input class="dept-input dep-inp" data-uid="${u.uid}" value="${u.dept||''}" placeholder="부서명 입력">
          </td>
          <td><span class="badge ${ROLE_CLS[u.role]||'badge-user'}">${ROLES[u.role]||'일반직원'}</span></td>
          <td>
            <select class="form-sel role-sel" data-uid="${u.uid}">
              <option value="user"      ${(!u.role||u.role==='user')    ?'selected':''}>일반직원</option>
              <option value="approver1" ${u.role==='approver1'?'selected':''}>1차승인자</option>
              <option value="approver2" ${u.role==='approver2'?'selected':''}>2차승인자(임원)</option>
              <option value="admin"     ${u.role==='admin'    ?'selected':''}>최고관리자</option>
            </select>
          </td>
          <td>
            <button class="btn btn-p btn-sm save-role" data-uid="${u.uid}" data-name="${dn(u)}">
              <i class="ti ti-check"></i>저장
            </button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>

  <div class="card" style="background:#fffbeb;border-color:#fde68a">
    <div class="ct" style="margin-bottom:10px;color:#92400e"><i class="ti ti-info-circle" style="color:#d97706"></i>역할 안내</div>
    <div style="font-size:13px;color:#78350f;line-height:2.1">
      📝 <b>일반직원</b> — 휴가 신청만 가능<br>
      ✅ <b>1차승인자</b> — 기안된 휴가 1차 승인/반려<br>
      🏆 <b>2차승인자(임원)</b> — 1차 승인된 휴가 최종 승인/반려<br>
      🔑 <b>최고관리자</b> — 모든 권한 + 이 관리자 페이지 접근
    </div>
  </div>`;
}

// ── 이벤트 바인딩 ──────────────────────────────────────
function bind(){
  // 로그인
  document.getElementById('btnLogin')?.addEventListener('click', async () => {
    try{ await signInWithPopup(auth, provider); }
    catch(e){ if(e.code!=='auth/popup-closed-by-user') toast('로그인 실패','err'); }
  });
  // 로그아웃
  document.getElementById('btnOut')?.addEventListener('click', ()=>signOut(auth));
  // 탭
  document.querySelectorAll('.tab-btn[data-tab]').forEach(b=>{
    b.onclick=()=>{ tab=b.dataset.tab; render(); };
  });

  // 개인 휴가 부여
  document.querySelectorAll('.do-grant').forEach(btn=>{
    btn.onclick=async()=>{
      const uid  = btn.dataset.uid;
      const name = btn.dataset.name;
      const inp  = document.querySelector(`.grant-days[data-uid="${uid}"]`);
      const days = parseInt(inp?.value)||0;
      if(days<1){ toast('일수를 입력해주세요','err'); return; }
      const u = allUsers.find(x=>x.uid===uid);
      await updateDoc(doc(db,'users',uid), {totalLeave:(u?.totalLeave||0)+days});
      toast(`${name}님에게 ${days}일 부여 완료`,'ok');
      await fetchData();
    };
  });

  // 전체 일괄 부여
  document.getElementById('doBulk')?.addEventListener('click', async()=>{
    const days = parseInt(document.getElementById('bulkDays').value)||0;
    if(days<1){ toast('일수를 입력해주세요','err'); return; }
    if(!confirm(`전체 ${allUsers.length}명에게 ${days}일씩 부여할까요?`)) return;
    await Promise.all(allUsers.map(u=>
      updateDoc(doc(db,'users',u.uid), {totalLeave:(u.totalLeave||0)+days})
    ));
    toast(`전체 직원에게 ${days}일 일괄 부여 완료`,'ok');
    await fetchData();
  });

  // 역할 저장
  document.querySelectorAll('.save-role').forEach(btn=>{
    btn.onclick=async()=>{
      const uid  = btn.dataset.uid;
      const name = btn.dataset.name;
      const roleSel = document.querySelector(`.role-sel[data-uid="${uid}"]`);
      const deptInp = document.querySelector(`.dep-inp[data-uid="${uid}"]`);
      const role = roleSel?.value;
      const dept = deptInp?.value||'';
      await updateDoc(doc(db,'users',uid), {role, dept, updatedAt:serverTimestamp()});
      toast(`${name}님 → ${ROLES[role]} / 부서: ${dept||'미지정'}`,'ok');
      await fetchData();
    };
  });
}
</script>
</body>
</html>
